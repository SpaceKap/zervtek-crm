name: CI

on:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://build:build@localhost:5432/build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Use root schema (same as VPS Docker) so typecheck/build catch schema mismatches
      - name: Validate root Prisma schema
        run: npx prisma validate --schema=prisma/schema.prisma

      - name: Generate Prisma client (root schema = matches Docker/VPS)
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build main app
        run: npm run build

      - name: Build portal
        run: npm run build:portal
        